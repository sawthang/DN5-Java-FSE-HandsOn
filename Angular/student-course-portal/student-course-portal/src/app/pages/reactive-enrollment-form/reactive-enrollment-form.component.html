<h2>Enrollment Request (Reactive Form)</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
  <div class="field">
    <label>Student Name</label>
    <input formControlName="studentName" />
    <span class="error" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']">
      Name is required
    </span>
  </div>

  <div class="field">
    <label>Student Email</label>
    <input formControlName="studentEmail" />
    <span class="error" *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
      This email is already taken
    </span>
  </div>

  <div class="field">
    <label>Course ID</label>
    <input formControlName="courseId" />
    <span class="error" *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
      Course code starting with XX is not allowed.
    </span>
  </div>

  <div class="field">
    <label>Preferred Semester</label>
    <select formControlName="preferredSemester">
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div class="field">
    <label><input type="checkbox" formControlName="agreeToTerms" /> I agree to the terms</label>
  </div>

  <div class="field" formArrayName="additionalCourses">
    <label>Additional Courses</label>
    <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="array-row">
      <input [formControl]="ctrl" placeholder="Course code" />
      <button type="button" (click)="removeCourse(i)">Remove</button>
    </div>
    <button type="button" (click)="addCourse()">Add Another Course</button>
  </div>

  <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
  <p class="success" *ngIf="submitted">Enrollment request submitted successfully!</p>
</form>
